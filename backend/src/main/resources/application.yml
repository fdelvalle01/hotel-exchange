server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: hotel-exchange-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/hotel_exchange}
    username: ${SPRING_DATASOURCE_USERNAME:hotel_exchange}
    password: ${SPRING_DATASOURCE_PASSWORD:hotel_exchange}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

logging:
  level:
    com.hotelexchange: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt-secret: ${JWT_SECRET:local-dev-jwt-secret-change-in-production-64-characters-long}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  websocket:
    max-payload-bytes: ${WS_MAX_PAYLOAD_BYTES:2048}
  chat:
    max-length: ${CHAT_MAX_LENGTH:240}
  login-rate-limit:
    max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
    window-minutes: ${LOGIN_RATE_LIMIT_WINDOW_MINUTES:5}
  seed:
    test-username: ${APP_SEED_USERNAME:trader}
    test-password: ${APP_SEED_PASSWORD:trader}
    second-test-username: ${APP_SEED_SECOND_USERNAME:broker}
    second-test-password: ${APP_SEED_SECOND_PASSWORD:broker}
