services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-exchange-postgres
    environment:
      POSTGRES_DB: hotel_exchange
      POSTGRES_USER: hotel_exchange
      POSTGRES_PASSWORD: hotel_exchange
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_exchange -d hotel_exchange"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hotel-exchange-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hotel_exchange
      SPRING_DATASOURCE_USERNAME: hotel_exchange
      SPRING_DATASOURCE_PASSWORD: hotel_exchange
      JWT_SECRET: local-dev-jwt-secret-change-in-production-64-characters-long
      JWT_EXPIRATION_MINUTES: 120
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      APP_SEED_USERNAME: trader
      APP_SEED_PASSWORD: trader
      APP_SEED_SECOND_USERNAME: broker
      APP_SEED_SECOND_PASSWORD: broker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hotel-exchange-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_WS_BASE_URL: ws://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
